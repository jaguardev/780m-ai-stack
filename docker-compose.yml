name: ai-stack

services:

  comfyui:
    image: vladchernikov/rocm:nightly-gfx110X-comfyui
    build:
      context: .
      target: comfyui
      args:
        ROCM_DOWNLOADS_URL: https://rocm.nightlies.amd.com/v2/gfx110X-all/
        TORCH_VERSION: 2.11.0+rocm7.13.0a20260416
        TORCHVISION_VERSION: 0.26.0+rocm7.13.0a20260416
        TORCHAUDIO_VERSION: 2.11.0+rocm7.13.0a20260416
        TRITON_VERSION: 3.6.0+rocm7.13.0a20260416
    container_name: comfyui
    restart: unless-stopped
    init: true
    ipc: host
    # use host or bridge network
    network_mode: "host"
    # ports:
    #   - "8188:8188"
    devices:
      - /dev/kfd
      - /dev/dri
    security_opt:
      - seccomp=unconfined
    volumes:
      - ./volumes/comfyui/models:/opt/ComfyUI/models
      - ./volumes/comfyui/input:/opt/ComfyUI/input
      - ./volumes/comfyui/output:/opt/ComfyUI/output
      - ./volumes/comfyui/custom_nodes:/opt/ComfyUI/custom_nodes
      - ./volumes/comfyui/user:/opt/ComfyUI/user
      - /root/.venv
      - /root/.config
      - /root/.cache
      - /root/.triton
    environment:
      # PYTORCH_TUNABLEOP_TUNING: 1
      # PYTORCH_TUNABLEOP_VERBOSE: 2
      # MIOPEN_FIND_MODE: 1
      # MIOPEN_FIND_ENFORCE: 3
      # MIOPEN_LOG_LEVEL: 5
      # FLASH_ATTENTION_TRITON_AMD_AUTOTUNE: "TRUE"
    command:
      - python
      - main.py
      - --use-sage-attention
      #- --use-flash-attention
      #- --use-pytorch-cross-attention
      #- --use-quad-cross-attention
      #- --use-split-cross-attention
      #- --disable-smart-memory
      - --disable-pinned-memory
      #- --disable-async-offload
      - --reserve-vram
      - "0.8"
      - --lowvram
      #- --normalvram
      #- --gpu-only
      #- --cpu-vae
      - --listen
      - 0.0.0.0
      - --port
      - "8188"

  ollama:
    image: vladchernikov/rocm:nightly-gfx110X-ollama
    build:
      context: .
      target: ollama
      args:
        ROCM_DOWNLOADS_URL: https://rocm.nightlies.amd.com/v2/gfx110X-all/
        ROCM_VERSION: 7.13.0a20260416
        GPU_ARCH: gfx1103
    container_name: ollama
    restart: unless-stopped
    init: true
    # use host or bridge network
    network_mode: "host"
    # ports:
    #   - "11434:11434"
    devices:
      - /dev/kfd
      - /dev/dri
    environment:
      OLLAMA_NUM_PARALLEL: "6"
      OLLAMA_MAX_LOADED_MODELS: "3"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_BATCH_SIZE: "1024"
      OLLAMA_CONTEXT_LENGTH: "8192"
      GGML_HIP_FORCE_MMQ: "1"
      GGML_HIP_USE_GRAPHS: "1"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    volumes:
      - ./volumes/ollama:/root/.ollama

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    init: true
    depends_on:
      ollama:
        condition: service_healthy
    # use host or bridge network
    network_mode: "host"
    # ports:
    #   - "8080:8080"
    environment:
      # if host network
      OLLAMA_BASE_URL: http://localhost:11434
      # if bridge network
      # OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./volumes/open-webui:/app/backend/data
